<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    <title>Oh Hell Scorekeeper</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1>🃏 Oh Hell Scorekeeper</h1>
        <div class="header-actions" id="headerActions"></div>
    </div>

    <!-- Setup Screen -->
    <div class="setup-screen" id="setupScreen">
        <!-- Game Setup Card -->
        <div class="card">
            <h2>New Game Setup</h2>

            <div style="display: flex; gap: 2rem; align-items: flex-start;">
                <div class="input-group" style="flex: 1;">
                    <label>Number of Players</label>
                    <div class="num-players-control">
                        <button type="button" class="num-players-step" onclick="changeNumPlayers(-1)">−</button>
                        <span id="numPlayersDisplay">5</span>
                        <button type="button" class="num-players-step" onclick="changeNumPlayers(1)">+</button>
                        <input type="hidden" id="numPlayers" value="5">
                    </div>
                    <div class="num-players-quick-row">
                        <button type="button" class="num-players-quick" onclick="setNumPlayers(5)">5 players</button>
                        <button type="button" class="num-players-quick" onclick="setNumPlayers(10)">10 players</button>
                    </div>
                </div>

                <div class="input-group" style="flex: 1;">
                    <label>Starting Hand Size</label>
                    <div class="num-players-control">
                        <button type="button" class="num-players-step" onclick="changeStartingHandSize(-1)">−</button>
                        <span id="startingHandSizeDisplay">10</span>
                        <button type="button" class="num-players-step" onclick="changeStartingHandSize(1)">+</button>
                        <input type="hidden" id="startingHandSize" value="10">
                    </div>
                    <p style="font-size: 0.85rem; color: #94a3b8; margin-top: 0.5rem;">
                        Game starts at this hand size. You can set hand size manually for each round.
                    </p>
                </div>
            </div>

            <div class="input-group">
                <label>Select Players</label>
                <div class="player-inputs" id="playerInputs"></div>
            </div>

            <button class="btn btn-success" onclick="startGame()" style="width: 100%; padding: 1rem; font-size: 1.1rem;">
                🎮 Start Game
            </button>
        </div>
    </div>

    <!-- Game Screen -->
    <div class="game-screen hidden" id="gameScreen">
        <div id="currentRoundSetup"></div>
        <div id="scoreboard"></div>
        <div id="historySection"></div>
    </div>

    <!-- Modals -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <!-- Content filled by openSettingsModal() -->
        </div>
    </div>

    <div class="modal" id="managePlayersModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>👥 Manage Players</h2>
                <button class="close-modal" onclick="closeModal('managePlayersModal')">&times;</button>
            </div>
            <p style="color: #cbd5e1; font-size: 0.9rem; margin-bottom: 1rem;">Add or remove players from your list.</p>

            <div class="input-group">
                <label>Add New Player</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="newPlayerName" placeholder="Enter player name" style="flex: 1;">
                    <button class="btn btn-success" onclick="addPlayer()" style="padding: 0.75rem 1.5rem;">➕ Add</button>
                </div>
            </div>

            <div class="input-group">
                <label>Saved Players</label>
                <div id="savedPlayersList" style="display: flex; flex-wrap: wrap; gap: 0.5rem;"></div>
            </div>

            <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem; border-top: 1px solid #475569; padding-top: 1rem;">
                <button class="btn btn-secondary" onclick="exportPlayers()" style="flex: 1;">📥 Export Players</button>
                <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()" style="flex: 1;">📤 Import Players</button>
                <button class="btn btn-primary" onclick="manualSync()" style="flex: 1;">🔄 Sync Now</button>
            </div>
            <input type="file" id="importFile" accept=".json" onchange="importPlayers(event)" style="display: none;">
        </div>
    </div>

    <div class="modal" id="gamePlayersModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🪑 Manage Table</h2>
                <button class="close-modal" onclick="closeModal('gamePlayersModal')">&times;</button>
            </div>
            <div id="gamePlayersContent"></div>
        </div>
    </div>

    <div class="modal" id="saveLoadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Saved Games</h2>
                <button class="close-modal" onclick="closeModal('saveLoadModal')">&times;</button>
            </div>
            <div class="game-list" id="gameList"></div>
        </div>
    </div>

    <div class="modal" id="editRoundModal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h2>Edit Round <span id="editRoundNumber"></span></h2>
                <button class="close-modal" onclick="closeModal('editRoundModal')">&times;</button>
            </div>
            <div id="editRoundContent"></div>
        </div>
    </div>

    <div class="modal" id="rulesModal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h2>📖 Oh Hell Rules & Scoring</h2>
                <button class="close-modal" onclick="closeModal('rulesModal')">&times;</button>
            </div>
            <div id="rulesContent"></div>
        </div>
    </div>

    <div class="modal" id="statsModal">
        <div class="modal-content" style="max-width: 980px;">
            <div class="modal-header">
                <h2>📊 History Stats</h2>
                <button class="close-modal" onclick="closeModal('statsModal')">&times;</button>
            </div>
            <div id="statsContent"></div>
        </div>
    </div>

    <input type="file" id="historyFolderInput" accept=".json,application/json" multiple webkitdirectory directory onchange="handleHistoryFolderSelect(event)" style="display: none;">

    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/players.js"></script>
    <script src="js/scoring.js"></script>
    <script src="js/rounds.js"></script>
    <script src="js/history.js"></script>
    <script src="js/rendering.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/lifecycle.js"></script>
    <script src="js/init.js"></script>
</body>
</html>
