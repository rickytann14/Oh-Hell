        function startNewRound() {
            const previousRound = gameState.rounds[gameState.currentRound - 1];
            const handSize = gameState.currentRound === 0
                ? gameState.startingHandSize
                : (previousRound?.handSize || gameState.startingHandSize);
            const dealerIndex = getNextDealerIndex(previousRound);

            const round = {
                handSize: handSize,
                dealerIndex: dealerIndex,
                trump: '',  // Add trump card tracking
                trumpRank: '',
                trumpSuit: '',
                reverseValue: 'N',
                playerData: gameState.players.map(player => createRoundPlayerData(player.active !== false)),
                scored: false
            };

            gameState.rounds.push(round);
            renderRoundSetup();
            renderScoreboard();
            autoSave(); // Auto-save after starting new round
        }

        function renderRoundSetup() {
            const round = gameState.rounds[gameState.currentRound];
            const container = document.getElementById('currentRoundSetup');
            const stickyInfo = document.getElementById('stickyRoundInfo');

            syncTrumpParts(round);
            
            const totalBids = round.playerData.reduce((sum, p) => sum + (p && p.participating ? p.bid : 0), 0);
            let bidStatus = '';
            let bidClass = '';
            
            if (totalBids < round.handSize) {
                bidStatus = '🦆 Under';
                bidClass = 'under';
            } else if (totalBids > round.handSize) {
                bidStatus = '🦢 Over';
                bidClass = 'over';
            } else {
                bidStatus = '❌ Exact';
                bidClass = 'exact';
            }

            const sortedPlayers = [...gameState.players]
                .map((p, idx) => ({...p, originalIndex: idx}))
                .sort((a, b) => b.score - a.score);
            const leader = sortedPlayers[0];
            const lowPlayer = sortedPlayers[sortedPlayers.length - 1];
            const dealer = gameState.players[round.dealerIndex] || leader;
            
            // Check if low player is unique (no ties)
            const lowScore = lowPlayer.score;
            const playersWithLowScore = gameState.players.filter(p => p.score === lowScore);
            const hasUniqueLow = playersWithLowScore.length === 1;

            stickyInfo.innerHTML = `
                <div class="round-summary">
                    <div class="round-summary-top">
                        <div class="leader-pill">👑 ${leader.name} ${leader.score}</div>
                        <div class="bid-tracker ${bidClass}">${totalBids}/${round.handSize} ${bidStatus}</div>
                    </div>
                    <div class="round-summary-bottom">
                        <span class="meta-chip">R${gameState.currentRound + 1}</span>
                        <span class="meta-chip">🎴 ${dealer.name}</span>
                        <span class="meta-chip">${round.reverseValue}</span>
                        ${hasUniqueLow ? `<span class="meta-chip low">↓ ${lowPlayer.name}</span>` : ''}
                        ${round.trump ? `<span class="meta-chip trump">🃏 ${round.trump}</span>` : ''}
                    </div>
                </div>
            `;

            container.innerHTML = `
                <div class="round-setup">
                    <div class="round-header">
                        <div>
                            <h3>Round ${gameState.currentRound + 1}</h3>
                            <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.25rem;">
                                <label style="font-size: 0.85rem; color: #cbd5e1;">Hand Size</label>
                                <div style="display: flex; gap: 0.25rem; align-items: center;">
                                    <button onclick="adjustCurrentRoundHandSize(-1)"
                                            ${round.scored ? 'disabled' : ''}
                                            class="bid-adjust-btn"
                                            style="width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #fca5a5; border-radius: 6px; font-weight: 700; font-size: 1.1rem; cursor: pointer; touch-action: manipulation; ${round.scored ? 'opacity: 0.45; cursor: not-allowed;' : ''}">
                                        −
                                    </button>
                                    <div style="min-width: 34px; text-align: center; font-weight: 700; font-size: 1rem; color: #fbbf24;">
                                        ${round.handSize}
                                    </div>
                                    <button onclick="adjustCurrentRoundHandSize(1)"
                                            ${round.scored ? 'disabled' : ''}
                                            class="bid-adjust-btn"
                                            style="width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(34, 197, 94, 0.2); border: 1px solid rgba(34, 197, 94, 0.4); color: #86efac; border-radius: 6px; font-weight: 700; font-size: 1.1rem; cursor: pointer; touch-action: manipulation; ${round.scored ? 'opacity: 0.45; cursor: not-allowed;' : ''}">
                                        +
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="bid-tracker ${bidClass}">
                            ${totalBids}/${round.handSize} ${bidStatus}
                        </div>
                    </div>
                    
                    <div style="background: rgba(251, 191, 36, 0.15); border: 2px solid rgba(251, 191, 36, 0.35); border-radius: 12px; padding: 1rem; margin-bottom: 1rem;">
                        <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
                            <label style="color: #fbbf24; font-weight: 600; font-size: 1rem;">🃏 Big Boss (Trump):</label>
                            <div style="display: flex; gap: 0.5rem; flex: 1; min-width: 220px; flex-wrap: wrap;">
                                <select onchange="updateTrumpRank(this.value)"
                                        style="flex: 1; min-width: 110px; padding: 0.5rem 0.75rem; font-size: 1rem; background: rgba(15, 23, 42, 0.8); border: 2px solid #fbbf24; color: #f1f5f9; border-radius: 8px;">
                                    <option value="">-- Rank --</option>
                                    ${TRUMP_RANKS.map(rank => `<option value="${rank}" ${round.trumpRank === rank ? 'selected' : ''}>${rank}</option>`).join('')}
                                </select>
                                <select onchange="updateTrumpSuit(this.value)"
                                        style="flex: 1; min-width: 110px; padding: 0.5rem 0.75rem; font-size: 1rem; background: rgba(15, 23, 42, 0.8); border: 2px solid #fbbf24; color: #f1f5f9; border-radius: 8px;">
                                    <option value="">-- Suit --</option>
                                    ${TRUMP_SUITS.map(suit => `<option value="${suit}" ${round.trumpSuit === suit ? 'selected' : ''}>${suit}</option>`).join('')}
                                </select>
                                <select onchange="updateReverseValue(this.value)"
                                        style="flex: 1; min-width: 110px; padding: 0.5rem 0.75rem; font-size: 1rem; background: rgba(15, 23, 42, 0.8); border: 2px solid #fbbf24; color: #f1f5f9; border-radius: 8px;">
                                    ${REVERSE_VALUE.map(value => `<option value="${value}" ${round.reverseValue === value ? 'selected' : ''}>${value === 'R' ? 'R - Reverse' : 'N - Normal'}</option>`).join('')}
                                </select>
                            </div>
                            ${round.trump ? `<div style="font-size: 1.5rem; padding: 0.25rem 0.75rem; background: rgba(251, 191, 36, 0.2); border-radius: 8px;">${round.trump}</div>` : ''}
                        </div>
                    </div>
                    
                    <div class="players-grid">
                        ${gameState.players.map((player, idx) => {
                            const pdata = round.playerData[idx];
                            if (!pdata || !pdata.participating) {
                                return '';
                            }

                            const madePrediction = calculatePlayerRoundScore(round, round.playerData[idx], false);
                            const setPrediction = calculatePlayerRoundScore(round, round.playerData[idx], true);
                            const existingRoundScore = round.scored ? (round.playerData[idx].score || 0) : 0;
                            const madeTotal = calculateProjectedTotal(player.score, madePrediction, existingRoundScore);
                            const setTotal = calculateProjectedTotal(player.score, setPrediction, existingRoundScore);

                            // Calculate current position
                            const sorted = [...gameState.players]
                                .map((p, i) => ({...p, originalIndex: i}))
                                .sort((a, b) => b.score - a.score);
                            const currentPosition = sorted.findIndex(p => p.originalIndex === idx) + 1;
                            const previousPosition = player.previousPosition || currentPosition;
                            
                            let positionIndicator = '';
                            if (round.scored && currentPosition < previousPosition) {
                                positionIndicator = '<span style="color: #10b981;">↗️</span>';
                            } else if (round.scored && currentPosition > previousPosition) {
                                positionIndicator = '<span style="color: #ef4444;">↘️</span>';
                            }
                            
                            const isLeader = currentPosition === 1;
                            const leaderCrown = isLeader ? '👑 ' : '';
                            
                            return `
                            <div class="player-card ${idx === round.dealerIndex ? 'dealer' : ''}">
                                <div class="player-name">
                                    ${leaderCrown}${player.name} ${positionIndicator}
                                    ${idx === round.dealerIndex ? '<span>🎴 Dealer</span>' : ''}
                                </div>
                                <div class="player-score ${player.score < 0 ? 'negative' : ''}">
                                    ${player.score}
                                </div>
                                
                                <div class="player-inputs-grid">
                                    <div>
                                        <label style="font-size: 0.8rem; color: #cbd5e1;">Bid</label>
                                        <div style="display: flex; gap: 0.25rem; align-items: center;">
                                            <button onclick="adjustBid(${idx}, -1)" 
                                                    class="bid-adjust-btn"
                                                    style="width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #fca5a5; border-radius: 6px; font-weight: 700; font-size: 1.2rem; cursor: pointer; touch-action: manipulation;">
                                                −
                                            </button>
                                            <div style="flex: 1; text-align: center; font-weight: 700; font-size: 1.3rem; color: #3b82f6; min-width: 40px;">
                                                ${round.playerData[idx].bid}
                                            </div>
                                            <button onclick="adjustBid(${idx}, 1)" 
                                                    class="bid-adjust-btn"
                                                    style="width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(34, 197, 94, 0.2); border: 1px solid rgba(34, 197, 94, 0.4); color: #86efac; border-radius: 6px; font-weight: 700; font-size: 1.2rem; cursor: pointer; touch-action: manipulation;">
                                                +
                                            </button>
                                        </div>
                                        <div class="quick-value-row">
                                            ${[5, 10].map(value => `
                                                <button class="quick-value-btn" onclick="setBid(${idx}, ${value})">${value}</button>
                                            `).join('')}
                                        </div>
                                    </div>
                                    <div>
                                        <label style="font-size: 0.8rem; color: #cbd5e1;">Tax</label>
                                        <div style="display: flex; gap: 0.25rem; align-items: center;">
                                            <button onclick="adjustTax(${idx}, -1)"
                                                    class="bid-adjust-btn"
                                                    style="width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #fca5a5; border-radius: 6px; font-weight: 700; font-size: 1.2rem; cursor: pointer; touch-action: manipulation;">
                                                −
                                            </button>
                                            <div style="flex: 1; text-align: center; font-weight: 700; font-size: 1.3rem; color: #f59e0b; min-width: 40px;">
                                                ${round.playerData[idx].tax}
                                            </div>
                                            <button onclick="adjustTax(${idx}, 1)"
                                                    class="bid-adjust-btn"
                                                    style="width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(34, 197, 94, 0.2); border: 1px solid rgba(34, 197, 94, 0.4); color: #86efac; border-radius: 6px; font-weight: 700; font-size: 1.2rem; cursor: pointer; touch-action: manipulation;">
                                                +
                                            </button>
                                        </div>
                                        <div class="quick-value-row">
                                            ${[5, 10, 15, 25].map(value => `
                                                <button class="quick-value-btn" onclick="setTax(${idx}, ${value})">${value}</button>
                                            `).join('')}
                                        </div>
                                    </div>
                                    <div style="grid-column: span 2;">
                                        <label style="font-size: 0.8rem; color: #cbd5e1;">Confidence</label>
                                        <select onchange="updateConfidence(${idx}, this.value)">
                                            <option value="MAX" ${round.playerData[idx].confidence === 'MAX' ? 'selected' : ''}>MAX</option>
                                            ${(round.playerData[idx].bid > 0 ? [0, 5, 10] : [0, 5]).map(n => 
                                                `<option value="${n}" ${round.playerData[idx].confidence == n ? 'selected' : ''}>${n}</option>`
                                            ).join('')}
                                        </select>
                                    </div>
                                </div>
                                
                                <div class="checkbox-group">
                                    <label class="checkbox-label">
                                        <input type="checkbox" ${round.playerData[idx].deferred ? 'checked' : ''} 
                                               onchange="updateDeferred(${idx}, this.checked)">
                                        Deferred
                                    </label>
                                    <label class="checkbox-label">
                                        <input type="checkbox" ${round.playerData[idx].gotSet ? 'checked' : ''} 
                                               onchange="updateGotSet(${idx}, this.checked)">
                                        Got Set
                                    </label>
                                </div>

                                <div class="score-prediction">
                                    <span class="made">If made: ${madeTotal} (${formatSignedValue(madePrediction)})</span>
                                    <span class="set">If set: ${setTotal} (${formatSignedValue(setPrediction)})</span>
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                    
                    ${!round.scored ? `
                        <button class="btn btn-success" onclick="scoreRound()" 
                                style="width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1.1rem;">
                            ✅ Score Round
                        </button>
                    ` : `
                        <div style="display: flex; gap: 0.5rem; margin-top: 1rem; flex-direction: column;">
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="btn btn-danger" onclick="undoLastRound()" style="flex: 1;">
                                    ↩️ Undo Round
                                </button>
                                <button class="btn btn-success" onclick="nextRound()" style="flex: 2;">
                                    ➡️ Next Round
                                </button>
                            </div>
                            <button class="btn btn-secondary" onclick="endGame()" style="padding: 0.75rem;">
                                🏁 End Game
                            </button>
                        </div>
                    `}
                </div>
            `;
        }

        function updateBid(playerIdx, value) {
            gameState.rounds[gameState.currentRound].playerData[playerIdx].bid = parseInt(value) || 0;
            renderRoundSetup();
            autoSave();
        }

        function adjustBid(playerIdx, delta) {
            const round = gameState.rounds[gameState.currentRound];
            const currentBid = round.playerData[playerIdx].bid;
            const newBid = Math.max(0, Math.min(round.handSize, currentBid + delta));
            round.playerData[playerIdx].bid = newBid;
            renderRoundSetup();
            autoSave();
        }

        function setBid(playerIdx, value) {
            const round = gameState.rounds[gameState.currentRound];
            const newBid = Math.max(0, Math.min(round.handSize, parseInt(value) || 0));
            round.playerData[playerIdx].bid = newBid;
            renderRoundSetup();
        }

        function adjustTax(playerIdx, delta) {
            const round = gameState.rounds[gameState.currentRound];
            const currentTax = round.playerData[playerIdx].tax;
            const newTax = Math.max(0, Math.min(25, currentTax + delta));
            round.playerData[playerIdx].tax = newTax;
            renderRoundSetup();
        }

        function setTax(playerIdx, value) {
            const round = gameState.rounds[gameState.currentRound];
            const newTax = Math.max(0, Math.min(25, parseInt(value) || 0));
            round.playerData[playerIdx].tax = newTax;
            renderRoundSetup();
        }

        function updateCurrentRoundHandSize(value) {
            const round = gameState.rounds[gameState.currentRound];
            round.handSize = Math.max(1, parseInt(value) || 1);

            round.playerData.forEach(pdata => {
                if (pdata.bid > round.handSize) {
                    pdata.bid = round.handSize;
                }
            });

            renderRoundSetup();
        }

        function adjustCurrentRoundHandSize(delta) {
            const round = gameState.rounds[gameState.currentRound];
            if (round.scored) return;

            const newSize = Math.max(1, Math.min(20, round.handSize + delta));
            updateCurrentRoundHandSize(newSize);
        }

        function updateTax(playerIdx, value) {
            gameState.rounds[gameState.currentRound].playerData[playerIdx].tax = parseInt(value) || 0;
            autoSave();
        }

        function updateConfidence(playerIdx, value) {
            gameState.rounds[gameState.currentRound].playerData[playerIdx].confidence = value;
            autoSave();
        }

        function updateDeferred(playerIdx, checked) {
            gameState.rounds[gameState.currentRound].playerData[playerIdx].deferred = checked;
            autoSave();
        }

        function updateGotSet(playerIdx, checked) {
            gameState.rounds[gameState.currentRound].playerData[playerIdx].gotSet = checked;
            autoSave();
        }

        function getConfidenceValue(bid, confidence) {
            if (confidence === 'MAX') {
                return bid > 0 ? 10 : 5;
            }

            return parseInt(confidence) || 0;
        }

        function calculatePlayerRoundScore(round, pdata, gotSetOverride = pdata.gotSet) {
            const bid = pdata.bid;
            const tax = pdata.tax;
            const deferredPenalty = pdata.deferred ? 2 : 0;
            const confidenceValue = getConfidenceValue(bid, pdata.confidence);

            if (gotSetOverride) {
                return -confidenceValue - deferredPenalty - tax;
            }

            if (bid > 0) {
                return 10 + (bid * bid) + confidenceValue - deferredPenalty - tax;
            }

            const zeroBonus = getRoundParticipatingCount(round) <= 6 ? 10 : 5;
            return zeroBonus + round.handSize + confidenceValue - deferredPenalty - tax;
        }

        function formatSignedValue(value) {
            return value >= 0 ? `+${value}` : `${value}`;
        }

        function calculateProjectedTotal(playerScore, predictedRoundScore, existingRoundScore = 0) {
            return playerScore - existingRoundScore + predictedRoundScore;
        }

        function parseTrumpCard(trumpValue) {
            if (!trumpValue || typeof trumpValue !== 'string') {
                return { rank: '', suit: '' };
            }

            const suit = TRUMP_SUITS.find(s => trumpValue.includes(s)) || '';
            if (!suit) {
                return { rank: '', suit: '' };
            }

            const rank = trumpValue.replace(suit, '').trim();
            if (!TRUMP_RANKS.includes(rank)) {
                return { rank: '', suit: '' };
            }

            return { rank, suit };
        }

        function syncTrumpParts(round) {
            if (!round) return;

            if (round.reverseValue === undefined || !REVERSE_VALUE.includes(round.reverseValue)) {
                round.reverseValue = 'N';
            }

            if (round.trumpRank === undefined || round.trumpSuit === undefined) {
                const parsed = parseTrumpCard(round.trump || '');
                round.trumpRank = parsed.rank;
                round.trumpSuit = parsed.suit;
            }

            if (round.trumpRank && round.trumpSuit) {
                round.trump = `${round.trumpRank}${round.trumpSuit}`;
            } else {
                round.trump = '';
            }
        }

        function updateTrumpRank(value) {
            const round = gameState.rounds[gameState.currentRound];
            round.trumpRank = value;
            syncTrumpParts(round);
            renderRoundSetup();
        }

        function updateTrumpSuit(value) {
            const round = gameState.rounds[gameState.currentRound];
            round.trumpSuit = value;
            syncTrumpParts(round);
            renderRoundSetup();
        }

        function updateReverseValue(value) {
            const round = gameState.rounds[gameState.currentRound];
            round.reverseValue = REVERSE_VALUE.includes(value) ? value : 'N';
            renderRoundSetup();
        }

        function scoreRound() {
            const round = gameState.rounds[gameState.currentRound];
            
            // Check if bids are exact (cannot score an exact round)
            const totalBids = round.playerData.reduce((sum, p) => sum + (p && p.participating ? p.bid : 0), 0);
            if (totalBids === round.handSize) {
                alert('❌ Cannot score round when bids are EXACT!\n\nThe total bids equal the hand size. Someone must change their bid.');
                return;
            }
            
            // Check if at least one player got set
            const anyoneSet = round.playerData.some(p => p && p.participating && p.gotSet);
            if (!anyoneSet) {
                alert('Please mark at least one player as "Got Set" to score the round!');
                return;
            }

            round.scored = true;

            // Calculate scores
            round.playerData.forEach((pdata, idx) => {
                if (!pdata || !pdata.participating) {
                    return;
                }

                const bid = pdata.bid;
                const roundScore = calculatePlayerRoundScore(round, pdata, pdata.gotSet);

                pdata.score = roundScore;
                gameState.players[idx].score += roundScore;
                gameState.players[idx].rounds.push({
                    round: gameState.currentRound + 1,
                    bid: bid,
                    gotSet: pdata.gotSet,
                    score: roundScore
                });
            });

            renderRoundSetup();
            renderScoreboard();
            renderHistory();
            updatePlayerPositions();
            autoSave();
        }

        function updatePlayerPositions() {
            // Create sorted array by score to determine current positions
            const sorted = [...gameState.players]
                .map((p, idx) => ({...p, originalIndex: idx}))
                .sort((a, b) => b.score - a.score);
            
            // Update each player's previous position for next comparison
            sorted.forEach((player, position) => {
                gameState.players[player.originalIndex].previousPosition = position + 1;
            });
        }

        function nextRound() {
            gameState.currentRound++;
            startNewRound();
        }

        function undoLastRound() {
            if (!confirm('Are you sure you want to undo this round?')) return;

            const round = gameState.rounds[gameState.currentRound];
            
            // Reverse the scores
            round.playerData.forEach((pdata, idx) => {
                if (!pdata || !pdata.participating) {
                    return;
                }

                gameState.players[idx].score -= pdata.score;
                gameState.players[idx].rounds.pop();
            });

            round.scored = false;
            renderRoundSetup();
            renderScoreboard();
            renderHistory();
            updatePlayerPositions();
        }

        function renderScoreboard() {
            const container = document.getElementById('scoreboard');
            const sortedPlayers = [...gameState.players]
                .map((p, idx) => ({...p, originalIndex: idx}))
                .sort((a, b) => b.score - a.score);

            container.innerHTML = `
                <div class="card">
                    <h2>Current Standings</h2>
                    <div class="final-ranking">
                        ${sortedPlayers.map((player, idx) => `
                            <div class="rank-item ${idx === 0 ? 'first' : ''}">
                                <div class="rank-position">#${idx + 1}</div>
                                <div class="rank-name">${player.name}${player.active === false ? ' <span style="font-size: 0.78rem; color: #cbd5e1;">(inactive)</span>' : ''}</div>
                                <div class="rank-score ${player.score < 0 ? 'negative' : ''}">${player.score}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderHistory() {
            const container = document.getElementById('historySection');
            const completedRounds = gameState.rounds.filter((r, idx) => r.scored);

            if (completedRounds.length === 0) {
                container.innerHTML = '';
                return;
            }

            // Create array with round indices for proper mapping
            const roundsWithIndices = gameState.rounds
                .map((round, idx) => ({round, idx}))
                .filter(r => r.round.scored)
                .reverse();

            container.innerHTML = `
                <div class="card">
                    <h2>Score History</h2>
                    <div class="score-history">
                        ${roundsWithIndices.map(({round, idx}) => {
                            const roundNum = idx + 1;
                            return `
                                <div class="history-round">
                                    <div class="history-round-header" style="display: flex; justify-content: space-between; align-items: center;">
                                        <span>Round ${roundNum} - Hand Size: ${round.handSize}${round.trump ? ` • 🃏 ${round.trump}` : ''}</span>
                                        <button class="btn btn-secondary btn-small" onclick="editRound(${idx})" style="padding: 0.4rem 0.8rem;">
                                            ✏️ Edit
                                        </button>
                                    </div>
                                    <div class="history-players">
                                        ${gameState.players.map((player, pIdx) => {
                                            const pdata = round.playerData[pIdx];
                                            if (!pdata || (!pdata.participating && pdata.absentReason !== 'joined-late')) {
                                                return '';
                                            }

                                            if (!pdata.participating && pdata.absentReason === 'joined-late') {
                                                return `
                                                    <div style="line-height: 1.4;">
                                                        <strong>${player.name}:</strong>
                                                        ⏱️ Joined later
                                                        <br>
                                                        <span style="color: #10b981; font-weight: 600;">
                                                            +${pdata.score}
                                                        </span>
                                                    </div>
                                                `;
                                            }

                                            return `
                                                <div style="line-height: 1.4;">
                                                    <strong>${player.name}:</strong> 
                                                    ${pdata.gotSet ? '❌' : '✅'} 
                                                    Bid: ${pdata.bid}
                                                    ${pdata.tax > 0 ? ` | Tax: ${pdata.tax}` : ''}
                                                    ${pdata.deferred ? ' | Def: ✓' : ''}
                                                    | Conf: ${pdata.confidence}
                                                    <br>
                                                    <span style="color: ${pdata.score > 0 ? '#10b981' : '#ef4444'}; font-weight: 600;">
                                                        ${pdata.score > 0 ? '+' : ''}${pdata.score}
                                                    </span>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function endGame() {
            const container = document.getElementById('currentRoundSetup');
            const stickyInfo = document.getElementById('stickyRoundInfo');
            const sortedPlayers = [...gameState.players].sort((a, b) => b.score - a.score);

            stickyInfo.innerHTML = '';

            container.innerHTML = `
                <div class="final-scores">
                    <h3>🏆 GAME OVER 🏆</h3>
                    <div class="final-ranking">
                        ${sortedPlayers.map((player, idx) => `
                            <div class="rank-item ${idx === 0 ? 'first' : ''}">
                                <div class="rank-position">${idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '#' + (idx + 1)}</div>
                                <div class="rank-name">${player.name}${player.active === false ? ' <span style="font-size: 0.78rem; color: rgba(15, 23, 42, 0.75);">(inactive)</span>' : ''}</div>
                                <div class="rank-score">${player.score}</div>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn btn-primary" onclick="newGame()" style="width: 100%; margin-top: 1.5rem; padding: 1rem;">
                        🎮 New Game
                    </button>
                </div>
            `;
        }

        function saveGame() {
            const gameToSave = {
                ...gameState,
                savedAt: new Date().toISOString()
            };
            
            const jsonString = JSON.stringify(gameToSave, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            
            // Generate shorter filename with just date and round
            const date = new Date().toISOString().split('T')[0];
            const round = gameState.currentRound + 1;
            const fileName = `oh-hell-${date}-r${round}.json`;
            
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            alert('✅ Game saved successfully!\n\nFile: ' + fileName);
        }

        function showSaveLoadModal() {
            const gameList = document.getElementById('gameList');

            gameList.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <p style="color: #cbd5e1; margin-bottom: 1.5rem;">Select a saved game file (.json) to load</p>
                    <button class="btn btn-primary" onclick="document.getElementById('loadGameFile').click()" style="padding: 1rem 2rem; font-size: 1.1rem;">
                        📁 Choose Game File
                    </button>
                    <input type="file" id="loadGameFile" accept=".json" onchange="loadGameFromFile(event)" style="display: none;">
                </div>
            `;

            document.getElementById('saveLoadModal').classList.add('active');
        }

        function loadGameFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const game = JSON.parse(e.target.result);
                    
                    // Validate it's a valid game file
                    if (!game.players || !game.rounds || !Array.isArray(game.players)) {
                        throw new Error('Invalid game file format');
                    }

                    // Handle backward compatibility
                    if (!game.startingHandSize) {
                        game.startingHandSize = game.handProgression?.[0]
                            || game.rounds?.[0]?.handSize
                            || game.currentHandSize
                            || 10;
                    }
                    
                    // Initialize previousPosition if not present
                    gameState = normalizeGameState(game);
                    document.getElementById('setupScreen').classList.add('hidden');
                    document.getElementById('gameScreen').classList.remove('hidden');
                    loadHeaderActions('game');
                    renderRoundSetup();
                    renderScoreboard();
                    renderHistory();
                    closeModal('saveLoadModal');
                    
                    alert('✅ Game loaded successfully!');
                } catch (error) {
                    alert('❌ Error loading game file: ' + error.message);
                }
            };
            reader.readAsText(file);
            
            // Reset file input
            event.target.value = '';
        }

        function deleteGame(gameId) {
            // This function is no longer needed but kept for backward compatibility
            alert('Delete function is no longer available. Simply delete the JSON file from your computer.');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        let editingRoundIndex = null;

        function editRound(roundIndex) {
            editingRoundIndex = roundIndex;
            const round = gameState.rounds[roundIndex];
            
            document.getElementById('editRoundNumber').textContent = roundIndex + 1;
            
            const totalBids = round.playerData.reduce((sum, p) => sum + p.bid, 0);
            let bidStatus = '';
            let bidClass = '';
            
            if (totalBids < round.handSize) {
                bidStatus = '🦆 Under';
                bidClass = 'under';
            } else if (totalBids > round.handSize) {
                bidStatus = '🦢 Over';
                bidClass = 'over';
            } else {
                bidStatus = '❌ Exact';
                bidClass = 'exact';
            }

            const content = document.getElementById('editRoundContent');
            content.innerHTML = `
                <div style="background: rgba(15, 23, 42, 0.9); padding: 1rem; border-radius: 12px; margin-bottom: 1rem;">
                    <div class="round-header">
                        <h3>Edit Round Settings</h3>
                        <div class="bid-tracker ${bidClass}">
                            ${totalBids}/${round.handSize} ${bidStatus}
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.75rem;">
                        <div>
                            <label style="font-size: 0.85rem; color: #cbd5e1;">Hand Size</label>
                            <div style="display: flex; gap: 0.25rem; align-items: center;">
                                <button onclick="adjustEditHandSize(-1)"
                                        class="bid-adjust-btn"
                                        style="width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #fca5a5; border-radius: 6px; font-weight: 700; font-size: 1.2rem; cursor: pointer; touch-action: manipulation;">
                                    −
                                </button>
                                <div style="flex: 1; text-align: center; font-weight: 700; font-size: 1.3rem; color: #fbbf24; min-width: 40px;">
                                    ${round.handSize}
                                </div>
                                <button onclick="adjustEditHandSize(1)"
                                        class="bid-adjust-btn"
                                        style="width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(34, 197, 94, 0.2); border: 1px solid rgba(34, 197, 94, 0.4); color: #86efac; border-radius: 6px; font-weight: 700; font-size: 1.2rem; cursor: pointer; touch-action: manipulation;">
                                    +
                                </button>
                            </div>
                        </div>
                        <div>
                            <label style="font-size: 0.85rem; color: #cbd5e1;">Round Number</label>
                            <input type="text" value="${roundIndex + 1}" disabled>
                        </div>
                    </div>
                </div>

                <div class="players-grid" id="editPlayersGrid">
                    ${gameState.players.map((player, idx) => {
                        const pdata = round.playerData[idx];
                        if (!pdata || !pdata.participating) {
                            const label = pdata?.absentReason === 'joined-late'
                                ? `Missed round credit: +${pdata.score}`
                                : 'Did not play this round';

                            return `
                                <div class="player-card" style="border-style: dashed; opacity: 0.78;">
                                    <div class="player-name">${player.name}</div>
                                    <div style="color: #cbd5e1; font-size: 0.92rem; line-height: 1.5;">${label}</div>
                                </div>
                            `;
                        }

                        const madePrediction = calculatePlayerRoundScore(round, round.playerData[idx], false);
                        const setPrediction = calculatePlayerRoundScore(round, round.playerData[idx], true);
                        const existingRoundScore = round.playerData[idx].score || 0;
                        const madeTotal = calculateProjectedTotal(player.score, madePrediction, existingRoundScore);
                        const setTotal = calculateProjectedTotal(player.score, setPrediction, existingRoundScore);

                        return `
                        <div class="player-card ${idx === round.dealerIndex ? 'dealer' : ''}">
                            <div class="player-name">
                                ${player.name}
                                ${idx === round.dealerIndex ? '<span>🎴 Dealer</span>' : ''}
                            </div>
                            
                            <div class="player-inputs-grid">
                                <div>
                                    <label style="font-size: 0.8rem; color: #cbd5e1;">Bid</label>
                                    <input type="number" min="0" max="${round.handSize}" value="${round.playerData[idx].bid}" 
                                           onchange="updateEditBid(${idx}, this.value)">
                                    <div class="quick-value-row">
                                        ${[5, 10].map(value => `
                                            <button class="quick-value-btn" onclick="setEditBid(${idx}, ${value})">${value}</button>
                                        `).join('')}
                                    </div>
                                </div>
                                <div>
                                    <label style="font-size: 0.8rem; color: #cbd5e1;">Tax</label>
                                    <div style="display: flex; gap: 0.25rem; align-items: center;">
                                        <button onclick="adjustEditTax(${idx}, -1)"
                                                class="bid-adjust-btn"
                                                style="width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #fca5a5; border-radius: 6px; font-weight: 700; font-size: 1.2rem; cursor: pointer; touch-action: manipulation;">
                                            −
                                        </button>
                                        <div style="flex: 1; text-align: center; font-weight: 700; font-size: 1.3rem; color: #f59e0b; min-width: 40px;">
                                            ${round.playerData[idx].tax}
                                        </div>
                                        <button onclick="adjustEditTax(${idx}, 1)"
                                                class="bid-adjust-btn"
                                                style="width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(34, 197, 94, 0.2); border: 1px solid rgba(34, 197, 94, 0.4); color: #86efac; border-radius: 6px; font-weight: 700; font-size: 1.2rem; cursor: pointer; touch-action: manipulation;">
                                            +
                                        </button>
                                    </div>
                                    <div class="quick-value-row">
                                        ${[5, 10, 15, 25].map(value => `
                                            <button class="quick-value-btn" onclick="setEditTax(${idx}, ${value})">${value}</button>
                                        `).join('')}
                                    </div>
                                </div>
                                <div style="grid-column: span 2;">
                                    <label style="font-size: 0.8rem; color: #cbd5e1;">Confidence</label>
                                    <select onchange="updateEditConfidence(${idx}, this.value)">
                                        <option value="MAX" ${round.playerData[idx].confidence === 'MAX' ? 'selected' : ''}>MAX</option>
                                        ${(round.playerData[idx].bid > 0 ? [0, 5, 10] : [0, 5]).map(n => 
                                            `<option value="${n}" ${round.playerData[idx].confidence == n ? 'selected' : ''}>${n}</option>`
                                        ).join('')}
                                    </select>
                                </div>
                            </div>
                            
                            <div class="checkbox-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" ${round.playerData[idx].deferred ? 'checked' : ''} 
                                           onchange="updateEditDeferred(${idx}, this.checked)">
                                    Deferred
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" ${round.playerData[idx].gotSet ? 'checked' : ''} 
                                           onchange="updateEditGotSet(${idx}, this.checked)">
                                    Got Set
                                </label>
                            </div>

                            <div class="score-prediction">
                                <span class="made">If made: ${madeTotal} (${formatSignedValue(madePrediction)})</span>
                                <span class="set">If set: ${setTotal} (${formatSignedValue(setPrediction)})</span>
                            </div>
                        </div>
                    `;
                    }).join('')}
                </div>

                <button class="btn btn-success" onclick="saveEditedRound()" 
                        style="width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1.1rem;">
                    💾 Save Changes
                </button>
            `;

            document.getElementById('editRoundModal').classList.add('active');
        }

        function updateEditBid(playerIdx, value) {
            gameState.rounds[editingRoundIndex].playerData[playerIdx].bid = parseInt(value) || 0;
            // Re-render the bid tracker
            editRound(editingRoundIndex);
        }

        function setEditBid(playerIdx, value) {
            const round = gameState.rounds[editingRoundIndex];
            round.playerData[playerIdx].bid = Math.max(0, Math.min(round.handSize, parseInt(value) || 0));
            editRound(editingRoundIndex);
        }

        function updateEditHandSize(value) {
            const round = gameState.rounds[editingRoundIndex];
            round.handSize = Math.max(1, parseInt(value) || 1);

            round.playerData.forEach(pdata => {
                if (pdata.bid > round.handSize) {
                    pdata.bid = round.handSize;
                }
            });

            editRound(editingRoundIndex);
        }

        function adjustEditHandSize(delta) {
            const round = gameState.rounds[editingRoundIndex];
            const newSize = Math.max(1, Math.min(20, round.handSize + delta));
            updateEditHandSize(newSize);
        }

        function updateEditTax(playerIdx, value) {
            gameState.rounds[editingRoundIndex].playerData[playerIdx].tax = parseInt(value) || 0;
        }

        function adjustEditTax(playerIdx, delta) {
            const round = gameState.rounds[editingRoundIndex];
            const currentTax = round.playerData[playerIdx].tax;
            const newTax = Math.max(0, Math.min(25, currentTax + delta));
            round.playerData[playerIdx].tax = newTax;
            editRound(editingRoundIndex);
        }

        function setEditTax(playerIdx, value) {
            const round = gameState.rounds[editingRoundIndex];
            round.playerData[playerIdx].tax = Math.max(0, Math.min(25, parseInt(value) || 0));
            editRound(editingRoundIndex);
        }

        function updateEditConfidence(playerIdx, value) {
            gameState.rounds[editingRoundIndex].playerData[playerIdx].confidence = value;
        }

        function updateEditDeferred(playerIdx, checked) {
            gameState.rounds[editingRoundIndex].playerData[playerIdx].deferred = checked;
        }

        function updateEditGotSet(playerIdx, checked) {
            gameState.rounds[editingRoundIndex].playerData[playerIdx].gotSet = checked;
        }

        function saveEditedRound() {
            const round = gameState.rounds[editingRoundIndex];
            
            // Check if at least one player got set
            const anyoneSet = round.playerData.some(p => p && p.participating && p.gotSet);
            if (!anyoneSet) {
                alert('Please mark at least one player as "Got Set"!');
                return;
            }

            // First, reverse the old scores for this round
            round.playerData.forEach((pdata, idx) => {
                if (!pdata) {
                    return;
                }

                gameState.players[idx].score -= pdata.score;
                
                // Find and remove the old round data from player history
                const roundHistoryIdx = gameState.players[idx].rounds.findIndex(
                    r => r.round === editingRoundIndex + 1
                );
                if (roundHistoryIdx >= 0) {
                    gameState.players[idx].rounds.splice(roundHistoryIdx, 1);
                }
            });

            // Now recalculate scores with new data
            round.playerData.forEach((pdata, idx) => {
                if (!pdata) {
                    return;
                }

                if (!pdata.participating) {
                    gameState.players[idx].score += pdata.score;

                    if (pdata.absentReason === 'joined-late' && pdata.score) {
                        gameState.players[idx].rounds.push({
                            round: editingRoundIndex + 1,
                            bid: null,
                            gotSet: false,
                            score: pdata.score,
                            joinedLate: true
                        });
                        gameState.players[idx].rounds.sort((a, b) => a.round - b.round);
                    }
                    return;
                }

                const bid = pdata.bid;
                const roundScore = calculatePlayerRoundScore(round, pdata, pdata.gotSet);

                pdata.score = roundScore;
                gameState.players[idx].score += roundScore;
                
                // Re-add to player history
                gameState.players[idx].rounds.push({
                    round: editingRoundIndex + 1,
                    bid: bid,
                    gotSet: pdata.gotSet,
                    score: roundScore
                });
                
                // Sort rounds by round number
                gameState.players[idx].rounds.sort((a, b) => a.round - b.round);
            });

            closeModal('editRoundModal');
            
            // Re-render everything
            if (editingRoundIndex === gameState.currentRound) {
                renderRoundSetup();
            }
            renderScoreboard();
            renderHistory();
            updatePlayerPositions();
            
            alert('Round updated successfully!');
        }

        function newGame() {
            if (gameState.rounds.length > 0 && !confirm('Start a new game? Current game will be lost if not saved.')) {
                return;
            }

            document.getElementById('setupScreen').classList.remove('hidden');
            document.getElementById('gameScreen').classList.add('hidden');
            loadHeaderActions('setup');

            const stickyInfo = document.getElementById('stickyRoundInfo');
            if (stickyInfo) {
                stickyInfo.innerHTML = '';
            }
            
            gameState = {
                players: [],
                rounds: [],
                currentRound: 0,
                startingHandSize: 10,
                gameId: null,
                createdAt: null
            };
            
            // Reset player inputs
            updatePlayerInputs();
            clearAutoSave(); // Clear auto-save when starting new game
        }

        // Close modals on background click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        function exportToExcel() {
            // Generate TSV data formatted for the Excel sheet
            let data = [];
            
            // Row 1: Player names (starting from column D)
            let row1 = ['', '', ''];  // A1, B1, C1 empty
            gameState.players.forEach(player => {
                row1.push(player.name);
            });
            data.push(row1);
            
            // Row 2: Score totals (with formulas reference - we'll put actual scores)
            let row2 = ['Rounds', '', 'Score'];
            gameState.players.forEach(player => {
                row2.push(player.score);
            });
            data.push(row2);
            
            // Now add each round (6 rows per round)
            gameState.rounds.forEach((round, roundIdx) => {
                if (!round.scored) return; // Skip unscored rounds
                
                // Row 1 of round: Hand Size
                let r1 = ['Hand Size', round.handSize, 'Tax'];
                round.playerData.forEach(pdata => {
                    r1.push(pdata.tax);
                });
                data.push(r1);
                
                // Row 2 of round: Bid Count (we'll show total/handSize)
                const totalBids = round.playerData.reduce((sum, p) => sum + p.bid, 0);
                let bidStatus = totalBids < round.handSize ? '🦆' : (totalBids > round.handSize ? '🦢' : '❌');
                let r2 = ['Bid Count', `${totalBids}/${round.handSize} ${bidStatus}`, 'Bid'];
                round.playerData.forEach(pdata => {
                    r2.push(pdata.bid);
                });
                data.push(r2);
                
                // Row 3 of round: Dealer
                const dealerName = gameState.players[round.dealerIndex].name;
                let r3 = ['Dealer', dealerName, 'Deferred'];
                round.playerData.forEach(pdata => {
                    r3.push(pdata.deferred ? 'TRUE' : 'FALSE');
                });
                data.push(r3);
                
                // Row 4 of round: Low indicator
                let r4 = ['Low', '', 'Confidence'];
                round.playerData.forEach(pdata => {
                    r4.push(pdata.confidence);
                });
                data.push(r4);
                
                // Row 5 of round: Scored / Got set
                let r5 = ['Scored', 'TRUE', 'Got set'];
                round.playerData.forEach(pdata => {
                    r5.push(pdata.gotSet ? 'TRUE' : 'FALSE');
                });
                data.push(r5);
                
                // Row 6 of round: High indicator / Score
                let r6 = ['High', '', 'Score'];
                round.playerData.forEach(pdata => {
                    r6.push(pdata.score);
                });
                data.push(r6);
            });
            
            // Convert to TSV
            const tsv = data.map(row => row.join('\t')).join('\n');
            
            // Copy to clipboard
            navigator.clipboard.writeText(tsv).then(() => {
                alert('✅ Game data copied to clipboard!\n\nTo paste into your Excel sheet:\n1. Open your Oh Hell Excel file\n2. Go to the ScoreV2 sheet\n3. Click on cell A1\n4. Press Ctrl+V (or Cmd+V on Mac)\n5. Your game data will populate the sheet!');
            }).catch(err => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = tsv;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                
                try {
                    document.execCommand('copy');
                    alert('✅ Game data copied to clipboard!\n\nTo paste into your Excel sheet:\n1. Open your Oh Hell Excel file\n2. Go to the ScoreV2 sheet\n3. Click on cell A1\n4. Press Ctrl+V (or Cmd+V on Mac)\n5. Your game data will populate the sheet!');
                } catch (e) {
                    alert('❌ Failed to copy. Please try again.');
                }
                
                document.body.removeChild(textarea);
            });
        }
    </script>
</body>
